name: A.P.E.X CI

on: [push, pull_request]

jobs:
  # ── Frontend: lint, test, build ──
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Unit tests
        run: cd frontend && npx vitest run

      - name: Production build
        run: cd frontend && npm run build

      - name: Check bundle size
        run: |
          SIZE=$(du -sb frontend/dist/assets/*.js | awk '{sum+=$1} END{print sum}')
          echo "JS bundle size: $SIZE bytes"
          if [ $SIZE -gt 2000000 ]; then
            echo "::warning::Bundle size exceeds 2MB"
          fi

  # ── Backend: ML endpoints + API tests ──
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r backend/processor/requirements.txt pytest

      - name: Run API tests
        run: cd backend/processor && python -m pytest test_main.py -v

      - name: Run integration tests
        run: python -m pytest tests/ -v --ignore=tests/test_trend_prediction.py
